<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的博客</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
</head>
<body>
  <!-- 粒子背景 -->
  <canvas id="particles"></canvas>

  <!-- 导航栏 -->
  <nav class="navbar" id="navbar">
    <div class="nav-brand">
      <a href="index.html">My Blog</a>
    </div>
    <button class="nav-toggle" id="navToggle" aria-label="菜单">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="navLinks">
      <li><a href="#home" class="active">首页</a></li>
      <li><a href="#posts">文章</a></li>
      <li><a href="#about">关于</a></li>
    </ul>
  </nav>

  <!-- Hero 区域 -->
  <section class="hero" id="home">
    <div class="hero-content">
      <h1 class="hero-title">欢迎来到我的博客</h1>
      <p class="hero-subtitle">记录技术与生活的点滴</p>
      <a href="#posts" class="hero-btn">开始阅读</a>
    </div>
  </section>

  <!-- 文章列表 -->
  <section class="posts-section" id="posts">
    <h2 class="section-title">最新文章</h2>
    <div class="posts-grid" id="postsGrid">
      <!-- JS 动态加载 -->
    </div>
  </section>

  <!-- 关于 -->
  <section class="about-section" id="about">
    <h2 class="section-title">关于我</h2>
    <div class="about-card">
      <div class="about-avatar"></div>
      <p>你好！欢迎来到我的个人博客。这里是我记录技术学习和生活感悟的地方。</p>
      <div class="about-links">
        <a href="https://github.com/" target="_blank" class="about-link">GitHub</a>
      </div>
    </div>
  </section>

  <!-- 页脚 -->
  <footer class="footer">
    <p>&copy; 2026 My Blog. Powered by GitHub Pages.</p>
  </footer>

  <!-- 文章详情模态框 -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <button class="modal-close" id="modalClose">&times;</button>
      <article class="modal-body" id="modalBody"></article>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="js/particles.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
