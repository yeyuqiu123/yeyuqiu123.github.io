<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>操作系统 - 信号机制过程演示</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
  :root {
    --bg: #080c14;
    --card: #0f1520;
    --card-alt: #141c2e;
    --border: #1c2840;
    --text: #e2e8f0;
    --text-dim: #5a6a84;
    --text-mid: #8896ac;
    --accent: #00e5a0;
    --signal: #ef4444;
    --kernel: #f97316;
    --highlight: #fbbf24;
    --success: #22c55e;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans SC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* 背景网格 */
  .bg-grid {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      radial-gradient(circle at 20% 30%, rgba(0,229,160,0.03) 0%, transparent 50%),
      radial-gradient(circle at 80% 70%, rgba(249,115,22,0.03) 0%, transparent 50%),
      linear-gradient(rgba(28,40,64,0.3) 1px, transparent 1px),
      linear-gradient(90deg, rgba(28,40,64,0.3) 1px, transparent 1px);
    background-size: 100% 100%, 100% 100%, 40px 40px, 40px 40px;
  }

  .container {
    position: relative; z-index: 1;
    max-width: 1600px; margin: 0 auto;
    padding: 22px 32px 32px;
  }

  /* 头部 */
  header {
    display: flex; align-items: baseline; gap: 18px;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  header h1 {
    font-size: 2rem; font-weight: 900;
    background: linear-gradient(135deg, var(--accent), #38d9a9);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: -0.02em;
  }
  header .tag {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem; color: var(--text-dim);
    border: 1px solid var(--border); border-radius: 4px;
    padding: 3px 10px; letter-spacing: 0.04em;
  }

  /* 进度条 */
  .progress-bar {
    display: flex; gap: 4px; margin-bottom: 20px; height: 5px;
  }
  .progress-bar .seg {
    flex: 1; border-radius: 2px;
    background: var(--border); transition: background 0.4s, box-shadow 0.4s;
  }
  .progress-bar .seg.active {
    background: var(--accent);
    box-shadow: 0 0 8px rgba(0,229,160,0.4);
  }
  .progress-bar .seg.done {
    background: rgba(0,229,160,0.35);
  }

  /* 主布局 */
  .main-layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    gap: 20px;
  }

  /* 步骤列表 */
  .step-list {
    display: flex; flex-direction: column; gap: 3px;
  }
  .step-item {
    font-size: 0.85rem; padding: 10px 12px;
    border-radius: 8px; cursor: pointer;
    color: var(--text-dim); transition: all 0.25s;
    border: 1px solid transparent;
    font-family: 'JetBrains Mono', monospace;
    line-height: 1.4;
  }
  .step-item:hover { background: var(--card-alt); color: var(--text-mid); }
  .step-item.active {
    background: rgba(0,229,160,0.08); color: var(--accent);
    border-color: rgba(0,229,160,0.2);
  }
  .step-item .num {
    font-weight: 700; margin-right: 6px;
    color: var(--text-dim);
  }
  .step-item.active .num { color: var(--accent); }
  .step-item.done .num { color: rgba(0,229,160,0.5); }

  /* 可视化区域 */
  .viz-area {
    display: flex; flex-direction: column; gap: 14px;
  }

  /* 场景区 */
  .scene {
    display: grid;
    grid-template-columns: 1fr auto 1fr auto 1fr;
    gap: 0; align-items: center;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 14px; padding: 28px 20px;
    min-height: 220px; position: relative;
  }

  .proc-card {
    border-radius: 12px; padding: 20px;
    border: 1.5px solid var(--border);
    background: var(--card-alt);
    transition: all 0.5s; position: relative;
  }
  .proc-card .proc-label {
    font-size: 0.78rem; font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim); margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .proc-card .proc-name {
    font-size: 1.2rem; font-weight: 700; margin-bottom: 6px;
  }
  .proc-card .proc-state {
    font-size: 0.85rem; font-family: 'JetBrains Mono', monospace;
    padding: 4px 10px; border-radius: 6px; display: inline-block;
    transition: all 0.4s;
  }
  .proc-card .proc-pc {
    font-size: 0.78rem; font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim); margin-top: 8px;
  }

  /* 进程状态颜色 */
  .state-user { background: rgba(0,229,160,0.12); color: var(--accent); }
  .state-kernel { background: rgba(249,115,22,0.12); color: var(--kernel); }
  .state-sighandler { background: rgba(239,68,68,0.12); color: var(--signal); }

  .proc-card.glow-accent { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,229,160,0.15); }
  .proc-card.glow-kernel { border-color: var(--kernel); box-shadow: 0 0 20px rgba(249,115,22,0.15); }
  .proc-card.glow-signal { border-color: var(--signal); box-shadow: 0 0 20px rgba(239,68,68,0.15); }

  /* 信号流动箭头 */
  .flow-arrow {
    display: flex; flex-direction: column; align-items: center;
    gap: 5px; padding: 0 12px; min-width: 100px;
  }
  .flow-line {
    height: 4px; width: 100%; border-radius: 2px;
    background: var(--border); position: relative;
    transition: all 0.5s; overflow: hidden;
  }
  .flow-line.active-signal {
    background: linear-gradient(90deg, var(--signal), #ff8888);
    box-shadow: 0 0 10px rgba(239,68,68,0.4);
  }
  .flow-line.active-accent {
    background: linear-gradient(90deg, var(--accent), #66ffcc);
    box-shadow: 0 0 10px rgba(0,229,160,0.4);
  }
  .flow-line.active-kernel {
    background: linear-gradient(90deg, var(--kernel), #ffb366);
    box-shadow: 0 0 10px rgba(249,115,22,0.4);
  }
  /* 流动粒子 */
  .flow-line::after {
    content: ''; position: absolute;
    top: -2px; width: 10px; height: 8px; border-radius: 50%;
    background: white; opacity: 0;
    transition: opacity 0.3s;
  }
  .flow-line.active-signal::after,
  .flow-line.active-accent::after,
  .flow-line.active-kernel::after {
    opacity: 1;
    animation: flowParticle 1.2s ease-in-out infinite;
  }
  @keyframes flowParticle {
    0% { left: -8px; opacity: 0; }
    15% { opacity: 1; }
    85% { opacity: 1; }
    100% { left: calc(100% + 8px); opacity: 0; }
  }
  .flow-label {
    font-size: 0.72rem; font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim); text-align: center;
    white-space: nowrap; transition: color 0.3s;
  }
  .flow-label.active { color: var(--signal); }
  .flow-label.active-a { color: var(--accent); }
  .flow-label.active-k { color: var(--kernel); }

  /* 内核卡片 */
  .kernel-card {
    border-radius: 12px; padding: 20px;
    border: 1.5px solid var(--border);
    background: linear-gradient(135deg, #1a1008, #1a1408);
    transition: all 0.5s;
  }
  .kernel-card.glow-kernel {
    border-color: var(--kernel);
    box-shadow: 0 0 24px rgba(249,115,22,0.15);
  }
  .kernel-card .k-label {
    font-size: 0.78rem; font-family: 'JetBrains Mono', monospace;
    color: var(--kernel); margin-bottom: 8px;
    text-transform: uppercase; letter-spacing: 0.08em;
  }
  .kernel-card .k-name {
    font-size: 1.2rem; font-weight: 700; color: var(--kernel); margin-bottom: 6px;
  }
  .kernel-card .k-action {
    font-size: 0.85rem; font-family: 'JetBrains Mono', monospace;
    padding: 4px 10px; border-radius: 6px; display: inline-block;
    background: rgba(249,115,22,0.1); color: var(--kernel);
    min-height: 28px; transition: all 0.4s;
  }

  /* 数据结构区 */
  .data-area {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }

  .panel {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px;
  }
  .panel-title {
    font-size: 0.82rem; font-family: 'JetBrains Mono', monospace;
    color: var(--text-dim); text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 14px;
    display: flex; align-items: center; gap: 8px;
  }
  .panel-title i { font-size: 0.85rem; }

  /* PCB位图 */
  .bitmap-row {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px;
  }
  .bitmap-label {
    font-size: 0.8rem; font-family: 'JetBrains Mono', monospace;
    color: var(--text-mid); width: 72px; flex-shrink: 0;
  }
  .bitmap-bits {
    display: flex; gap: 4px;
  }
  .bit-cell {
    width: 34px; height: 34px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.85rem; font-family: 'JetBrains Mono', monospace;
    font-weight: 600;
    background: rgba(28,40,64,0.5); color: var(--text-dim);
    border: 1px solid transparent;
    transition: all 0.4s;
    position: relative;
  }
  .bit-cell.bit-1 {
    background: rgba(239,68,68,0.15); color: var(--signal);
    border-color: rgba(239,68,68,0.3);
  }
  .bit-cell.changed {
    animation: bitPulse 0.8s ease;
    border-color: var(--highlight) !important;
    box-shadow: 0 0 12px rgba(251,191,36,0.4);
  }
  @keyframes bitPulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }
  .bit-signal-label {
    font-size: 0.68rem; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    text-align: center; margin-top: 3px;
  }
  .bit-labels {
    display: flex; gap: 4px; margin-left: 82px; margin-bottom: 14px;
  }
  .bit-labels span {
    width: 34px; text-align: center;
  }

  /* Handler表 */
  .handler-table {
    width: 100%;
  }
  .handler-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 10px; border-radius: 8px;
    margin-bottom: 4px; transition: all 0.4s;
    font-family: 'JetBrains Mono', monospace; font-size: 0.85rem;
  }
  .handler-row:hover { background: rgba(28,40,64,0.5); }
  .handler-row.highlight {
    background: rgba(251,191,36,0.08);
    border: 1px solid rgba(251,191,36,0.2);
  }
  .handler-sig {
    color: var(--signal); width: 80px; flex-shrink: 0; font-weight: 600;
  }
  .handler-arrow { color: var(--text-dim); }
  .handler-val { color: var(--accent); }
  .handler-val.dfl { color: var(--text-dim); }

  /* 栈面板 */
  .stack-vis {
    display: flex; flex-direction: column-reverse;
    gap: 4px; min-height: 180px;
  }
  .stack-frame {
    padding: 10px 14px; border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem; font-weight: 500;
    border: 1px solid transparent;
    transition: all 0.5s;
    position: relative;
    animation: frameSlideIn 0.4s ease;
  }
  @keyframes frameSlideIn {
    from { opacity: 0; transform: translateY(-10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .stack-frame.sf-main {
    background: rgba(0,229,160,0.08); color: var(--accent);
    border-color: rgba(0,229,160,0.15);
  }
  .stack-frame.sf-sigframe {
    background: rgba(239,68,68,0.08); color: var(--signal);
    border-color: rgba(239,68,68,0.15);
  }
  .stack-frame.sf-sigframe-header {
    background: rgba(239,68,68,0.04); color: var(--signal);
    border-color: rgba(239,68,68,0.1);
    border-style: dashed; font-size: 0.72rem;
    text-align: center; padding: 6px 14px;
  }
  .stack-frame.sf-handler {
    background: rgba(251,191,36,0.08); color: var(--highlight);
    border-color: rgba(251,191,36,0.15);
  }
  .stack-frame.sf-removing {
    animation: frameSlideOut 0.5s ease forwards;
  }
  @keyframes frameSlideOut {
    to { opacity: 0; transform: translateY(10px); height: 0; padding: 0; margin: 0; border: 0; }
  }
  .stack-frame .frame-detail {
    font-size: 0.68rem; color: var(--text-dim); margin-top: 3px;
  }
  .stack-sp {
    font-size: 0.72rem; color: var(--highlight);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 8px;
  }
  .stack-sp i { margin-right: 4px; }

  /* CPU 状态指示器 */
  .cpu-badge {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 14px; border-radius: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem; font-weight: 600;
    transition: all 0.4s;
  }
  .cpu-badge .dot {
    width: 10px; height: 10px; border-radius: 50%;
    transition: all 0.4s;
  }
  .cpu-user { background: rgba(0,229,160,0.1); color: var(--accent); }
  .cpu-user .dot { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .cpu-kernel { background: rgba(249,115,22,0.1); color: var(--kernel); }
  .cpu-kernel .dot { background: var(--kernel); box-shadow: 0 0 6px var(--kernel); }

  /* 说明区域 */
  .desc-area {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 24px 28px;
    margin-top: 14px;
  }
  .step-title-row {
    display: flex; align-items: center; gap: 14px; margin-bottom: 12px;
  }
  .step-num-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem; font-weight: 700;
    background: var(--accent); color: var(--bg);
    padding: 4px 12px; border-radius: 6px;
  }
  .step-title {
    font-size: 1.2rem; font-weight: 700;
  }
  .step-subtitle {
    font-size: 0.85rem; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }
  .step-desc {
    font-size: 1rem; line-height: 1.75; color: var(--text-mid);
    max-width: 960px;
  }
  .step-desc strong { color: var(--text); font-weight: 600; }
  .step-desc .hl-accent { color: var(--accent); font-weight: 600; }
  .step-desc .hl-signal { color: var(--signal); font-weight: 600; }
  .step-desc .hl-kernel { color: var(--kernel); font-weight: 600; }
  .step-desc .hl-yellow { color: var(--highlight); font-weight: 600; }

  /* 控制按钮 */
  .controls {
    display: flex; align-items: center; gap: 12px;
    margin-top: 20px; flex-wrap: wrap;
  }
  .btn {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.88rem; font-weight: 600;
    padding: 10px 22px; border-radius: 8px;
    border: 1px solid var(--border); cursor: pointer;
    transition: all 0.25s; background: var(--card-alt); color: var(--text);
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: var(--border); color: var(--text-dim); }
  .btn-primary {
    background: var(--accent); color: var(--bg); border-color: var(--accent);
  }
  .btn-primary:hover { background: #00ffb3; border-color: #00ffb3; color: var(--bg); }
  .btn-primary:disabled { background: var(--accent); opacity: 0.3; }
  .auto-label {
    font-size: 0.8rem; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
    margin-left: 8px;
  }

  /* 关键点标注 */
  .key-point {
    display: flex; gap: 10px; align-items: flex-start;
    margin-top: 12px; padding: 12px 14px;
    background: rgba(251,191,36,0.04);
    border-left: 3px solid var(--highlight);
    border-radius: 0 8px 8px 0;
  }
  .key-point i { color: var(--highlight); margin-top: 2px; font-size: 0.92rem; }
  .key-point .kp-text {
    font-size: 0.92rem; color: var(--highlight); line-height: 1.6;
  }

  /* 信号传递动画 - 飞行信号 */
  .flying-signal {
    position: absolute; pointer-events: none; z-index: 10;
    font-size: 1.4rem; color: var(--signal);
    text-shadow: 0 0 10px rgba(239,68,68,0.6);
    transition: all 0.8s cubic-bezier(0.22, 0.61, 0.36, 1);
    opacity: 0;
  }
  .flying-signal.visible { opacity: 1; }

  /* 响应式 */
  @media (max-width: 900px) {
    .main-layout { grid-template-columns: 1fr; }
    .step-list { flex-direction: row; flex-wrap: wrap; gap: 4px; }
    .step-item { font-size: 0.72rem; padding: 8px 10px; }
    .data-area { grid-template-columns: 1fr; }
    .scene { grid-template-columns: 1fr; gap: 12px; padding: 16px; }
    .flow-arrow { flex-direction: row; min-width: auto; padding: 8px 0; }
    .flow-line { width: 3px !important; height: 30px !important; }
  }

  /* 滚动条 */
  ::-webkit-scrollbar { width: 7px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* 减弱动画偏好 */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.01ms !important;
      transition-duration: 0.01ms !important;
    }
  }
</style>
</head>
<body>
<div class="bg-grid"></div>

<div class="container">
  <header>
    <h1>信号机制过程演示</h1>
    <span class="tag">OS · Process & Thread · Signal</span>
  </header>

  <!-- 进度条 -->
  <div class="progress-bar" id="progressBar"></div>

  <div class="main-layout">
    <!-- 步骤列表 -->
    <nav class="step-list" id="stepList" aria-label="步骤导航"></nav>

    <!-- 可视化区域 -->
    <div class="viz-area">
      <!-- 场景区 -->
      <section class="scene" id="scene">
        <!-- 进程B -->
        <div class="proc-card" id="procB">
          <div class="proc-label">发送进程</div>
          <div class="proc-name">进程 B</div>
          <div class="proc-state state-user" id="procBState">用户态运行</div>
          <div class="proc-pc" id="procBPC">PID: 2000</div>
        </div>

        <!-- 流动箭头1: B → Kernel -->
        <div class="flow-arrow">
          <div class="flow-line" id="flow1"></div>
          <div class="flow-label" id="flow1Label">kill()</div>
        </div>

        <!-- 内核 -->
        <div class="kernel-card" id="kernelCard">
          <div class="k-label">Kernel Space</div>
          <div class="k-name">内核</div>
          <div class="k-action" id="kernelAction">空闲</div>
        </div>

        <!-- 流动箭头2: Kernel → A -->
        <div class="flow-arrow">
          <div class="flow-line" id="flow2"></div>
          <div class="flow-label" id="flow2Label">传递信号</div>
        </div>

        <!-- 进程A -->
        <div class="proc-card" id="procA">
          <div class="proc-label">目标进程</div>
          <div class="proc-name">进程 A</div>
          <div class="proc-state state-user" id="procAState">用户态运行</div>
          <div class="proc-pc" id="procAPC">PID: 1000 | PC: main()+0x42</div>
        </div>
      </section>

      <!-- 数据结构区 -->
      <div class="data-area">
        <!-- PCB面板 -->
        <div class="panel">
          <div class="panel-title"><i class="fa-solid fa-microchip"></i> 进程A — PCB 信号字段</div>

          <div style="margin-bottom:12px;">
            <div class="bitmap-row">
              <span class="bitmap-label">pending</span>
              <div class="bitmap-bits" id="pendingBits"></div>
            </div>
            <div class="bit-labels" id="pendingLabels"></div>
          </div>

          <div style="margin-bottom:12px;">
            <div class="bitmap-row">
              <span class="bitmap-label">block</span>
              <div class="bitmap-bits" id="blockBits"></div>
            </div>
            <div class="bit-labels" id="blockLabels"></div>
          </div>

          <div>
            <div class="panel-title" style="margin-bottom:8px;"><i class="fa-solid fa-table-list"></i> handler 表 (sighandler_t)</div>
            <div class="handler-table" id="handlerTable"></div>
          </div>

          <div style="margin-top:12px; display:flex; align-items:center; gap:12px;">
            <span class="panel-title" style="margin-bottom:0;"><i class="fa-solid fa-bolt"></i> CPU模式</span>
            <span class="cpu-badge cpu-user" id="cpuBadge">
              <span class="dot"></span>
              <span id="cpuMode">用户态</span>
            </span>
          </div>
        </div>

        <!-- 栈面板 -->
        <div class="panel">
          <div class="panel-title"><i class="fa-solid fa-layer-group"></i> 进程A — 栈空间</div>
          <div class="stack-vis" id="stackVis"></div>
          <div class="stack-sp" id="stackSP"><i class="fa-solid fa-arrow-up"></i> SP → 栈顶</div>
        </div>
      </div>

      <!-- 说明区域 -->
      <div class="desc-area">
        <div class="step-title-row">
          <span class="step-num-badge" id="stepNumBadge">0</span>
          <span class="step-title" id="stepTitle">初始状态</span>

    desc: '内核从信号帧中恢复了原始的用户态上下文后，返回用户态。进程A的 PC 恢复到被信号中断时的位置 <span class="hl-accent">main()+0x42</span>，栈指针恢复到原始位置，所有寄存器值恢复。进程A<strong>仿佛什么都没发生过</strong>，继续从中断点执行。整个信号处理流程至此完成。',
    keyPoint: '信号处理全流程总结：①kill()发送 → ②内核置pending位 → ③目标进程进入内核态 → ④检测pending → ⑤检查block → ⑥查handler表 → ⑦构建sigframe → ⑧执行处理函数 → ⑨sigreturn恢复 → ⑩继续执行。整个过程对应用程序透明，除非注册了自定义处理函数。',
    procA: { state: '用户态运行（已恢复）', stateClass: 'state-user', glow: 'glow-accent', pc: 'PID: 1000 | PC: main()+0x42' },
    procB: { state: '用户态运行', stateClass: 'state-user', glow: '', pc: 'PID: 2000' },
    kernel: { action: '空闲', glow: '' },
    flow1: { cls: '', label: '' },
    flow2: { cls: '', label: '' },
    pending: [0,0,0,0,0,0,0,0], pendingChanged: -1,
    block:  [0,0,0,0,0,0,0,0], blockChanged: -1,
    handler: [
      { sig: 'SIGINT', val: 'sighandler', hl: false },
      { sig: 'SIGQUIT', val: 'SIG_DFL', hl: false },
      { sig: 'SIGKILL', val: 'SIG_DFL', hl: false },
      { sig: 'SIGTERM', val: 'SIG_IGN', hl: false },
    ],
    handlerHL: -1,
    cpuMode: '用户态', cpuClass: 'cpu-user',
    stack: [
      { type: 'main', text: 'main() 栈帧', detail: '局部变量、返回地址等' },
    ],
    spLabel: 'SP → 用户栈顶（已恢复）',
  },
];

// ===== 状态变量 =====
let currentStep = 0;
let autoTimer = null;
let isAuto = false;

// ===== DOM引用 =====
const $ = id => document.getElementById(id);

// ===== 初始化 =====
function init() {
  buildProgressBar();
  buildStepList();
  buildBitmaps();
  renderStep(0);
  bindEvents();
}

function buildProgressBar() {
  const bar = $('progressBar');
  bar.innerHTML = '';
  for (let i = 0; i < STEPS.length; i++) {
    const seg = document.createElement('div');
    seg.className = 'seg';
    seg.dataset.idx = i;
    bar.appendChild(seg);
  }
}

function buildStepList() {
  const list = $('stepList');
  list.innerHTML = '';
  STEPS.forEach((s, i) => {
    const item = document.createElement('div');
    item.className = 'step-item';
    item.dataset.idx = i;
    item.innerHTML = `<span class="num">${i}.</span>${s.title}`;
    item.addEventListener('click', () => goToStep(i));
    list.appendChild(item);
  });
}

function buildBitmaps() {
  // 位图会在renderStep时动态更新
}

// ===== 渲染步骤 =====
function renderStep(idx) {
  const step = STEPS[idx];

  // 更新进度条
  document.querySelectorAll('.progress-bar .seg').forEach((seg, i) => {
    seg.className = 'seg' + (i < idx ? ' done' : i === idx ? ' active' : '');
  });

  // 更新步骤列表
  document.querySelectorAll('.step-item').forEach((item, i) => {
    item.className = 'step-item' + (i === idx ? ' active' : i < idx ? ' done' : '');
  });

  // 进程A
  const pa = step.procA;
  $('procA').className = `proc-card ${pa.glow}`;
  $('procAState').className = `proc-state ${pa.stateClass}`;
  $('procAState').textContent = pa.state;
  $('procAPC').textContent = pa.pc;

  // 进程B
  const pb = step.procB;
  $('procB').className = `proc-card ${pb.glow}`;
  $('procBState').className = `proc-state ${pb.stateClass}`;
  $('procBState').textContent = pb.state;
  $('procBPC').textContent = pb.pc;

  // 内核
  $('kernelCard').className = `kernel-card ${step.kernel.glow}`;
  $('kernelAction').textContent = step.kernel.action;

  // 流动箭头
  const f1 = step.flow1;
  $('flow1').className = `flow-line ${f1.cls}`;
  $('flow1Label').textContent = f1.label;
  $('flow1Label').className = `flow-label ${f1.labelCls || ''}`;

  const f2 = step.flow2;
  $('flow2').className = `flow-line ${f2.cls}`;
  $('flow2Label').textContent = f2.label;
  $('flow2Label').className = `flow-label ${f2.labelCls || ''}`;

  // PCB位图 - pending
  renderBitmap('pendingBits', 'pendingLabels', step.pending, step.pendingChanged, step.pendingHighlight);

  // PCB位图 - block
  renderBitmap('blockBits', 'blockLabels', step.block, step.blockChanged, step.blockHighlight);

  // Handler表
  renderHandlerTable(step.handler);

  // CPU模式
  $('cpuBadge').className = `cpu-badge ${step.cpuClass}`;
  $('cpuMode').textContent = step.cpuMode;

  // 栈
  renderStack(step.stack);

  // SP标签
  $('stackSP').innerHTML = `<i class="fa-solid fa-arrow-up"></i> ${step.spLabel}`;

  // 说明文字
  $('stepNumBadge').textContent = idx;
  $('stepTitle').textContent = step.title;
  $('stepSubtitle').textContent = step.subtitle ? `— ${step.subtitle}` : '';
  $('stepDesc').innerHTML = step.desc;

  // 关键点
  if (step.keyPoint) {
    $('keyPoint').style.display = 'flex';
    $('keyPointText').innerHTML = step.keyPoint;
  } else {
    $('keyPoint').style.display = 'none';
  }

  // 控制按钮
  $('btnPrev').disabled = idx === 0;
  $('btnNext').disabled = idx === STEPS.length - 1;
}

function renderBitmap(bitsId, labelsId, bits, changedIdx, highlightIdx) {
  const container = $(bitsId);
  const labelsContainer = $(labelsId);
  container.innerHTML = '';
  labelsContainer.innerHTML = '';

  bits.forEach((b, i) => {
    const cell = document.createElement('div');
    cell.className = 'bit-cell' + (b ? ' bit-1' : '') + (i === changedIdx ? ' changed' : '');
    cell.textContent = b;

    // 高亮（检查阶段）
    if (i === highlightIdx) {
      cell.style.borderColor = b ? 'rgba(239,68,68,0.5)' : 'rgba(0,229,160,0.5)';
      cell.style.boxShadow = b ? '0 0 8px rgba(239,68,68,0.3)' : '0 0 8px rgba(0,229,160,0.3)';
    }

    container.appendChild(cell);

    // 信号标签
    const lbl = document.createElement('span');
    lbl.className = 'bit-signal-label';
    lbl.textContent = i < SIGNAL_NAMES.length ? SIGNAL_NAMES[i].replace('SIG','') : i;
    if (i === highlightIdx) lbl.style.color = b ? 'var(--signal)' : 'var(--accent)';
    labelsContainer.appendChild(lbl);
  });
}

function renderHandlerTable(handlers) {
  const table = $('handlerTable');
  table.innerHTML = '';
  handlers.forEach(h => {
    const row = document.createElement('div');
    row.className = 'handler-row' + (h.hl ? ' highlight' : '');
    row.innerHTML = `
      <span class="handler-sig">${h.sig}</span>
      <span class="handler-arrow">→</span>
      <span class="handler-val ${h.val === 'SIG_DFL' ? 'dfl' : ''}">${h.val}${h.val === 'SIG_DFL' ? ' (默认)' : h.val === 'SIG_IGN' ? ' (忽略)' : ' (自定义)'}</span>
    `;
    table.appendChild(row);
  });
}

function renderStack(frames) {
  const vis = $('stackVis');
  vis.innerHTML = '';
  frames.forEach(f => {
    const frame = document.createElement('div');
    const typeClass = f.type === 'main' ? 'sf-main' :
                      f.type === 'sigframe-header' ? 'sf-sigframe-header' :
                      f.type === 'sigframe' ? 'sf-sigframe' :
                      f.type === 'handler' ? 'sf-handler' : '';
    frame.className = `stack-frame ${typeClass}`;
    frame.innerHTML = `${f.text}${f.detail ? `<div class="frame-detail">${f.detail}</div>` : ''}`;
    vis.appendChild(frame);
  });
}

// ===== 导航 =====
function goToStep(idx) {
  if (idx < 0 || idx >= STEPS.length) return;
  currentStep = idx;
  renderStep(idx);
}

function nextStep() {
  if (currentStep < STEPS.length - 1) {
    goToStep(currentStep + 1);
  } else {
    stopAuto();
  }
}

function prevStep() {
  if (currentStep > 0) goToStep(currentStep - 1);
}

function resetSteps() {
  stopAuto();
  goToStep(0);
}

function toggleAuto() {
  if (isAuto) {
    stopAuto();
  } else {
    startAuto();
  }
}

function startAuto() {
  isAuto = true;
  $('btnAuto').innerHTML = '<i class="fa-solid fa-pause"></i> 暂停';
  $('autoLabel').textContent = '自动播放中...';
  autoTimer = setInterval(() => {
    if (currentStep < STEPS.length - 1) {
      nextStep();
    } else {
      stopAuto();
    }
  }, 3500);
}

function stopAuto() {
  isAuto = false;
  $('btnAuto').innerHTML = '<i class="fa-solid fa-play"></i> 自动播放';
  $('autoLabel').textContent = '';
  if (autoTimer) { clearInterval(autoTimer); autoTimer = null; }
}

// ===== 事件绑定 =====
function bindEvents() {
  $('btnPrev').addEventListener('click', prevStep);
  $('btnNext').addEventListener('click', nextStep);
  $('btnAuto').addEventListener('click', toggleAuto);
  $('btnReset').addEventListener('click', resetSteps);

  // 键盘导航
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowRight' || e.key === ' ') {
      e.preventDefault();
      nextStep();
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      prevStep();
    } else if (e.key === 'r' || e.key === 'R') {
      resetSteps();
    }
  });
}

// ===== 启动 =====
document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
